<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>superskills // mcp</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">superskills.</div>
    <div class="status-indicator">
      <div class="pulse"></div>
      <span id="uptime">Active</span>
    </div>
  </header>

  <main>
    <section class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Registry</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Static</span>
        <span class="stat-value" id="stat-static">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Auto</span>
        <span class="stat-value" id="stat-auto">0</span>
      </div>
    </section>

    <section class="skills-grid" id="skills-grid">
      <!-- Minimalist rows injected here -->
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
